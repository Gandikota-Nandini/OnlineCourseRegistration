<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Course Registration</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f8f9fa;
}

.form-container{
    max-width:800px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

footer{
    background:#212529;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:40px;
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="index.html">TechLearn</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link" href="courses.html">Courses</a></li>
<li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
<li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
<li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
</ul>
</div>
</div>
</nav>

<!-- Registration Form -->
<div class="container">
<div class="form-container">

<h2 class="text-center mb-4">Course Registration Form</h2>

<div id="successAlert" class="alert alert-success d-none">
    Registration Successful!
</div>

<form id="registrationForm">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Gender</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender" required>
<label class="form-check-label">Male</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Female</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Other</label>
</div>

</div>

<div class="mb-3">
<label class="form-label">Course Selection</label>

<select class="form-select" required>
<option value="">Select Course</option>
<option>Web Development</option>
<option>Python Programming</option>
<option>Data Science</option>
<option>AI & Machine Learning</option>
<option>Java Programming</option>
<option>Cloud Computing</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Qualification</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Address</label>
<textarea class="form-control" rows="4" required></textarea>
</div>

<div class="mb-3">
<label class="form-label">Upload Resume</label>
<input type="file" class="form-control">
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" id="terms" required>
<label class="form-check-label" for="terms">
I agree to the Terms & Conditions
</label>
</div>

<button type="submit" class="btn btn-success w-100">
Register Now
</button>

</form>

</div>
</div>

<!-- Footer -->
<footer>
<h5>TechLearn Institute</h5>
<p>Hyderabad, Telangana</p>
<p>Phone: +91 9876543210</p>
<p>Email: info@techlearn.com</p>
</footer>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("successAlert").classList.remove("d-none");

this.reset();

window.scrollTo({
top:0,
behavior:"smooth"
});

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
